{% extends "base.html" %}
{% load static %}

{% block title %}Cerrar sesión - TixiPWA{% endblock %}

{% block extra_css %}
<style>
  .auth-shell {
    max-width: 460px;
    margin: 0 auto;
  }

  .auth-card {
    border: 0;
    border-radius: 14px;
  }

  .auth-brand {
    text-align: center;
    margin-bottom: 1rem;
  }

  .auth-logo {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
    margin-bottom: 0.75rem;
  }
</style>
{% endblock %}

{% block content %}
<section class="auth-shell py-3 py-md-4">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4 p-md-5 text-center">
      <div class="auth-brand">
        <img src="{% static 'accounts/auth-logo.jpeg' %}" alt="Logo TixiPWA" class="auth-logo">
        <h2 class="h3 mb-2">Cerrar sesión</h2>
        <p class="text-muted mb-4">¿Seguro que quieres salir de tu cuenta?</p>
      </div>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {% if redirect_field_value %}
          <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
        {% endif %}

        <button type="submit" class="btn btn-success w-100 mb-3">Sí, cerrar sesión</button>
      </form>

      <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100">Cancelar</a>
    </div>
  </div>
</section>
{% endblock %}
