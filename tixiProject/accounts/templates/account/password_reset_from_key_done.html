{% extends "base.html" %}
{% load static %}

{% block title %}Contraseña actualizada - TixiPWA{% endblock %}

{% block extra_css %}
<style>
  .auth-shell { max-width: 520px; margin: 0 auto; }
  .auth-card { border: 0; border-radius: 14px; }
  .auth-brand { text-align: center; margin-bottom: 1rem; }
  .auth-logo {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
    margin-bottom: 0.75rem;
  }
</style>
{% endblock %}

{% block content %}
<section class="auth-shell py-3 py-md-4">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4 p-md-5 text-center">
      <div class="auth-brand">
        <img src="{% static 'accounts/auth-logo.jpeg' %}" alt="Logo TixiPWA" class="auth-logo">
        <h2 class="h3 mb-3">Contraseña actualizada</h2>
        <p class="text-muted mb-4">Tu contraseña se cambió correctamente. Ya puedes iniciar sesión.</p>
      </div>
      <a href="{% url 'account_login' %}" class="btn btn-primary w-100">Iniciar sesión</a>
    </div>
  </div>
</section>
{% endblock %}
