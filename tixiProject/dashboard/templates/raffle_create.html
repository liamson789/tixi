{% extends 'base.html' %}

{% block title %}Crear Nueva Rifa{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>Crear Nueva Rifa</h1>

    <form method="POST" class="mt-4">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Crear Rifa</button>
        <a href="{% url 'dashboard:home' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
