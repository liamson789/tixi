{% extends "base.html" %}

{% block extra_css %}
<style>
.numbers-grid {
  display: grid;
  grid-template-columns: repeat(10, minmax(0, 1fr));
  gap: 8px;
}

.number-box {
  padding: 10px;
  text-align: center;
  border-radius: 6px;
  font-weight: bold;
  min-width: 0;
}

@media (max-width: 768px) {
  .numbers-grid {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }
}

@media (max-width: 480px) {
  .numbers-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

.available {
  background-color: #FFFFFF;
  cursor: pointer;
}

.reserved {
  background-color: #F3F4F6;
}

.sold {
  background-color: #22C55E;
  color: #FFFFFF;
}

.mine {
  background-color: #0F172A;
  color: #FFFFFF;
  border: 1px solid #0F172A;
}
</style>
{% endblock %}

{% block content %}{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.querySelector("form");
  if (!form) return;

  const price = Number("{{ raffle.price_per_number|default:'0' }}");
  const totalDisplay = document.createElement("p");
  form.appendChild(totalDisplay);

  const updateTotal = () => {
    const selected = form.querySelectorAll("input[type=checkbox]:checked").length;
    totalDisplay.innerText = "Total: $" + (selected * price).toFixed(2);
  };

  form.addEventListener("change", (event) => {
    if (event.target && event.target.matches('input[type="checkbox"]')) {
      updateTotal();
    }
  });

  updateTotal();
});
</script>
{% endblock %}
